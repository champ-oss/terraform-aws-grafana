name: module

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - 'README.md'
  schedule:
    - cron: "0 7 * * *"

concurrency: this

env:
  TF_INPUT: false
  TF_IN_AUTOMATION: true
  TF_STATE_BUCKET: "env-tfbackend-oss-backend"
  AWS_DEFAULT_REGION: us-east-2
  GITHUB_TOKEN: ${{ secrets.CHAMP_TESTING_GITHUB_TOKEN }}
  GITHUB_OWNER: "champ-testing"

jobs:
  list-examples:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - id: set-matrix
        working-directory: examples
        run: |
          EXAMPLES=$(ls -1 | jq -Rsc '. / "\n" - [""]')
          echo $EXAMPLES
          echo "EXAMPLES=$EXAMPLES" >> $GITHUB_OUTPUT
    outputs:
      EXAMPLES: ${{ steps.set-matrix.outputs.EXAMPLES }}
  run-example:
    needs: list-examples
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        EXAMPLES: ${{ fromJson(needs.list-examples.outputs.EXAMPLES) }}
    defaults:
      run:
        shell: bash
        working-directory: examples/${{ matrix.EXAMPLES }}
    steps:
      - uses: actions/checkout@v7
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
      - uses: hashicorp/setup-terraform@v4 # https://github.com/hashicorp/setup-terraform/releases
        with:
          terraform_version: 1.12.2 # https://github.com/hashicorp/terraform/releases
          terraform_wrapper: false
      - name: copy lockfile
        run: cp ../complete/.terraform.lock.hcl . || true
      - name: init
        run: terraform init
      - name: disable prevent_destroy
        working-directory: .
        run: find . -type f -name '*.tf' -exec sed -i'' -e 's/prevent_destroy = true/prevent_destroy = false/g' {} +
      - name: validate
        run: terraform validate
      - name: plan
        run: terraform plan -out=tfplan
      - name: apply
        run: terraform apply -auto-approve tfplan
      - name: check
        run: terraform plan -detailed-exitcode
      - name: integration test
        run: |
          for row in $(echo $(terraform output -json) | jq -c '. | to_entries[]'); do
            key=$(echo $row | jq -r '.key' | tr '[:lower:]' '[:upper:]')
            value=$(echo $row | jq -r '.value.value' | tr -d '\n[]" ')
            echo $key=$value
            export $key=$value
          done
          if [ -f test.sh ]; then bash test.sh; fi
      - name: destroy
        if: always()
        run: terraform destroy -auto-approve
  module:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [run-example]
    steps:
      - run: exit 1
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}

